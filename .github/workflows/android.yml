name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: android-apk
  cancel-in-progress: true

jobs:
  apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm ci

      - name: Generate the native Android project
        run: |
          npx cap add android
          npx cap sync android

      - name: Build APK
        run: cd android && ./gradlew assembleDebug --no-daemon

      - name: Collect artifact
        run: cp android/app/build/outputs/apk/debug/app-debug.apk PerfectFit.apk

      - name: Publish APK to the android-latest release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view android-latest --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload android-latest PerfectFit.apk --clobber --repo "$GITHUB_REPOSITORY"
          else
            gh release create android-latest PerfectFit.apk \
              --repo "$GITHUB_REPOSITORY" \
              --title "Perfect Fit — Android app (APK)" \
              --notes "On your Android phone: download **PerfectFit.apk** below, open it, and allow the install when prompted. Or just play in any browser: https://tevelhalachmi.github.io/perfect-fit/"
          fi
